name: Android Kernel Driver Builder

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version'
        required: true
        default: '15'
      kernel_version:
        description: 'Kernel Version'
        required: true
        default: '6.6'
      driver_name:
        description: 'Driver Name (e.g., dream.ko)'
        required: true
        default: 'dream.ko'
      target_arch:
        description: 'Target Architecture'
        required: true
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential flex bison libssl-dev bc gcc-aarch64-linux-gnu

      - name: Clone Android kernel source
        run: |
          git clone --depth=1 --branch common-android${ANDROID}-${KERNEL} https://android.googlesource.com/kernel/common.git kernel
        env:
          ANDROID: ${{ github.event.inputs.android_version }}
          KERNEL: ${{ github.event.inputs.kernel_version }}

      - name: Build driver
        run: |
          export KDIR=$(pwd)/kernel
          cd code
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-artifact
          path: code/*.ko
