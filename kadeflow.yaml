name: Last Try - Build from Vanilla Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Download vanilla kernel source
        run: |
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.89.tar.xz
          tar -xf linux-6.6.89.tar.xz
          cd linux-6.6.89
          cp ../device_defconfig .config
          make ARCH=arm64 olddefconfig
          make ARCH=arm64 modules_prepare

      - name: Build dream.ko
        run: |
          make -C linux-6.6.89 M=$(pwd)/code ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload .ko file
        uses: actions/upload-artifact@v4
        with:
          name: dream-ko-last-try
          path: code/dream.ko
