name: Build dream.ko (Module Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Clone kernel source (shallow)
        run: |
          git clone --depth=1 --branch android15-6.6 你的内核仓库地址 kernel_source

      - name: Prepare kernel build environment
        run: |
          cd kernel_source
          make ARCH=arm64 你的设备_defconfig
          make ARCH=arm64 modules_prepare

      - name: Build dream.ko
        run: |
          make -C kernel_source M=$(pwd)/code ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-module
          path: code/dream.ko
