name: Build dream.ko for Xiaomi 13 (Quick Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Clone AOSP kernel source (5.15 Android 13)
        run: |
          git clone --depth=1 --branch android13-5.15-lts \
            https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/kernel/common.git \
            kernel_source

      - name: Prepare kernel build environment
        run: |
          cd kernel_source
          mkdir -p common/android   # ← 修复：创建缺失目录
          cp ../device_defconfig .config
          make ARCH=arm64 olddefconfig
          make ARCH=arm64 modules_prepare -j$(nproc)

      - name: Build dream.ko
        run: |
          make -C kernel_source M=$(pwd)/code ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-module
          path: code/dream.ko
