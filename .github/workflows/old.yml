name: Build dream.ko for Xiaomi 13 (AOSP 5.15)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Clone AOSP kernel source (5.15 Android 13)
        run: |
          git clone --depth=1 --branch android13-5.15-lts \
            https://android.googlesource.com/kernel/common \
            kernel_source

      - name: Prepare kernel build environment
        run: |
          cd kernel_source
          cp ../device_defconfig .config
          make ARCH=arm64 olddefconfig
          # 禁用 ABI 符号检查（GKI 白名单校验）
          sed -i 's/CONFIG_MODULE_SIG_ALL=y/# CONFIG_MODULE_SIG_ALL is not set/' .config
          sed -i 's/CONFIG_KASAN=y/# CONFIG_KASAN is not set/' .config
          # 允许缺失的白名单文件
          touch common/android/abi_symbol_list
          # 准备模块编译环境
          make ARCH=arm64 modules_prepare

      - name: Build dream.ko
        run: |
          make -C kernel_source M=$(pwd)/code ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-module
          path: code/dream.ko
