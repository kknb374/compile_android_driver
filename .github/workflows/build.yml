name: Final Build dream.ko (GKI Kernel)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Install repo and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libssl-dev bc curl xz-utils
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

      - name: Initialize AOSP Common Kernel source (Android 15, 6.6)
        run: |
          export PATH=~/bin:$PATH
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6 --depth=1
          repo sync -c -j$(nproc)

      - name: Copy driver into kernel tree
        run: |
          mkdir -p android-kernel/common/drivers/kerneldriver
          cp -r code/* android-kernel/common/drivers/kerneldriver/
          cd android-kernel/common
          echo 'obj-y += kerneldriver/' >> drivers/Makefile

      - name: Configure kernel with exact version
        run: |
          cd android-kernel/common
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          scripts/config --disable CONFIG_LOCALVERSION_AUTO
          scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g5a0ffb447cd1d-ab13774115-4k"
          echo "0" > .scmversion
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)

      - name: Build dream.ko
        run: |
          cd android-kernel/common
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=drivers/kerneldriver modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-perfect
          path: android-kernel/common/drivers/kerneldriver/dream.ko
