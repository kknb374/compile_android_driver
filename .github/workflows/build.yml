name: Build dream.ko (Matched & Safe)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version'
        required: true
        default: '15'
      kernel_version:
        description: 'Kernel Version'
        required: true
        default: '6.6'
      driver_name:
        description: 'Driver Name'
        required: true
        default: 'dream.ko'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare kernel driver directory
        run: |
          mkdir -p kerneldriver
          cp -r code/* kerneldriver/

      - name: Install repo tool
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-aarch64-linux-gnu libssl-dev bc
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

      - name: Setup Android kernel source (using repo, never miss a space)
        run: |
          export PATH=~/bin:$PATH
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }} --depth=1
          repo sync -c -j$(nproc)

      - name: Copy kernel driver into tree
        run: |
          mkdir -p android-kernel/common/drivers/kerneldriver
          cp -r kerneldriver/* android-kernel/common/drivers/kerneldriver/
          cd android-kernel/common
          echo 'obj-y += kerneldriver/' >> drivers/Makefile

      - name: Configure kernel, force version to 6.6.89-android15
        run: |
          cd android-kernel/common
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          # 1. 强制修改 SUBLEVEL 为 89，匹配你的内核
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 89/' Makefile
          # 2. 设置 LOCALVERSION 精确匹配内核版本（包含 -android15 和完整 commit hash）
          ./scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g5a0ffb447cd1d-ab13774115-4k"
          # 3. 防止出现 -dirty 标记
          echo "0" > .scmversion
          touch .scmversion
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Build only the driver module (relax modpost)
        run: |
          cd android-kernel/common
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          KBUILD_MODPOST_WARN=1 make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=drivers/kerneldriver modules

      - name: Upload ONLY dream.ko (no out-of-memory)
        uses: actions/upload-artifact@v4
        with:
          name: dream.ko
          path: android-kernel/common/drivers/kerneldriver/dream.ko
