name: Final Build dream.ko with Write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Install all necessary build tools (GCC cross-compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu flex bison bc curl xz-utils

      - name: Download Linux 6.6.89 kernel source
        run: |
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.89.tar.xz
          tar -xf linux-6.6.89.tar.xz
          mv linux-6.6.89 kernel_source

      - name: Configure kernel and prepare modules
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make defconfig
          scripts/config --disable CONFIG_LOCALVERSION_AUTO
          scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g5a0ffb447cd1d-ab13774115-4k"
          echo "0" > .scmversion
          make olddefconfig
          make modules_prepare -j$(nproc)

      - name: Build dream.ko
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make M=$(pwd)/../code modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-perfect
          path: code/dream.ko
