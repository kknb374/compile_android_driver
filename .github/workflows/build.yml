name: Final Build dream.ko with Write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Install build tools (Clang + cross binutils)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm flex bison bc curl xz-utils binutils-aarch64-linux-gnu

      - name: Download Linux 6.6.89 kernel source
        run: |
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.89.tar.xz
          tar -xf linux-6.6.89.tar.xz
          mv linux-6.6.89 kernel_source

      - name: Configure kernel (default config + exact version)
        run: |
          cd kernel_source
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- defconfig
          scripts/config --disable CONFIG_LOCALVERSION_AUTO
          scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g5a0ffb447cd1d-ab13774115-4k"
          echo "0" > .scmversion
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)

      - name: Build dream.ko
        run: |
          make -C kernel_source M=$(pwd)/code ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-perfect
          path: code/dream.ko
