name: Build dream.ko (final-fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential flex bison libssl-dev bc gcc-aarch64-linux-gnu

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch common-android15-6.6 https://android.googlesource.com/kernel/common.git kernel

      - name: Force kernel version to 6.6.89 and set vermagic suffix
        run: |
          cd kernel
          # 修改 Makefile 中的 SUBLEVEL 为 89
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 89/' Makefile
          # 生成默认配置
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          # 设置 LOCALVERSION 后缀，与你的设备完全一致
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-8-g5a0ffb447c1d-ab13774115-4k"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Build driver module
        run: |
          cd code
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C ../kernel M=$PWD modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream.ko
          path: code/dream.ko
