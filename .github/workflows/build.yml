name: Build dream.ko (Safe)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version'
        required: true
        default: '15'
      kernel_version:
        description: 'Kernel Version'
        required: true
        default: '6.6'
      driver_name:
        description: 'Driver Name'
        required: true
        default: 'dream.ko'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential flex bison libssl-dev bc gcc-aarch64-linux-gnu

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch common-android${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }} https://android.googlesource.com/kernel/common.git kernel

      - name: Build driver
        run: |
          cd code
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C ../kernel M=$PWD modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream.ko
          path: code/dream.ko
