name: Build Perfect dream.ko with Write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Download Linux 6.6.89 kernel source
        run: |
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.89.tar.xz
          tar -xf linux-6.6.89.tar.xz
          mv linux-6.6.89 kernel_source

      - name: Configure kernel with device defconfig and correct version
        run: |
          cd kernel_source
          cp ../device_defconfig .config
          # 注入完全相同的 LOCALVERSION
          scripts/config --disable CONFIG_LOCALVERSION_AUTO
          scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g5a0ffb447cd1d-ab13774115-4k"
          echo "0" > .scmversion
          make ARCH=arm64 olddefconfig
          make ARCH=arm64 modules_prepare -j$(nproc)
        continue-on-error: false

      - name: Build dream.ko
        run: |
          make -C kernel_source M=$(pwd)/code ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream-perfect
          path: code/dream.ko
