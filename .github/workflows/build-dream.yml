name: Build dream.ko for 6.6.66-android15

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core flex bison gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libssl-dev bc

      - name: Clone kernel source (android15-6.6)
        run: |
          git clone --depth=1 --branch android15-6.6 https://android.googlesource.com/kernel/common kernel_source

      - name: Copy driver into kernel tree
        run: |
          mkdir -p kernel_source/drivers/kerneldriver
          cp -r code/* kernel_source/drivers/kerneldriver/
          cd kernel_source
          echo 'obj-y += kerneldriver/' >> drivers/Makefile

      - name: Configure kernel and force version
        run: |
          cd kernel_source
          # 强制主版本号为 6.6.66
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 66/' Makefile
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          scripts/config --disable CONFIG_LOCALVERSION_AUTO
          # 设置 LOCALVERSION 精确匹配你的内核
          scripts/config --set-str CONFIG_LOCALVERSION "-android15-8-g29d86c5fc9dd-abogki428889875-4k"
          echo "0" > .scmversion
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)

      - name: Build dream.ko
        run: |
          cd kernel_source
          echo "6.6.66-android15-8-g29d86c5fc9dd-abogki428889875-4k" > include/config/kernel.release
          KBUILD_MODPOST_WARN=1 make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=drivers/kerneldriver modules

      - name: Upload dream.ko
        uses: actions/upload-artifact@v4
        with:
          name: dream.ko
          path: kernel_source/drivers/kerneldriver/dream.ko
